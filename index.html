<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dispensary Visit Inspection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 16px;
    }
    h1 {
      margin-bottom: 12px;
    }
    .card {
      background: white;
      padding: 16px;
      border-radius: 6px;
    }
    .section {
  background: white;
  padding: 16px;
  margin-top: 16px;
  border-radius: 6px;
}
textarea {
  margin-top: 6px;
}
  </style>
</head>
<body>

<h1>Dispensary Visit Inspection</h1>

<div class="card">
  <div><strong>Status:</strong> <span id="status">Loading…</span></div>
  <div>
    <strong>Score:</strong>
    <span id="score">0</span> / 100
     (+<span id="bonus">0</span> bonus)
  </div>
  <div id="storeWarning" style="color:#b00020; font-size:14px; display:none;">
    Please select a store to begin scoring.
  </div>
</div>
<div class="section">
  <h2>Store Being Visited</h2>

  <label for="storeSelect" style="font-weight:bold">
    Select Dispensary
  </label>

  <select id="storeSelect" style="width:100%; margin-top:6px">
    <option value="">— Select a location —</option>
  <option value="East Liverpool">East Liverpool</option>
  <option value="Elyria">Elyria</option>
  <option value="Cuyahoga Falls">Cuyahoga Falls</option>
  <option value="Harrison">Harrison</option>
  <option value="Norwood">Norwood</option>
  <option value="New Paris">New Paris</option>
  <option value="Keowee">Keowee</option>
</select>
</div>
<div id="inspection"></div>
  <div id="positive-experiences" class="section"></div>
<script>
  let positiveExperiences = [];
  let selectedStore = '';
let answers = {};

let currentConfig;

fetch('config.json')
  .then(r => r.json())
  .then(cfg => {
    currentConfig = cfg;

    document.getElementById('status').innerText =
      'Loaded: ' + cfg.inspectionMeta.inspectionName;

    renderInspection(cfg);
   renderPositiveExperiences();

    updateScore(cfg);
  })
  .catch(err => {
    document.getElementById('status').innerText =
      'Config load error: ' + err.message;
    console.error(err);
  });

function renderPositiveExperiences() {
  const container = document.getElementById('positive-experiences');

  container.innerHTML = `
    <h2>Positive Experiences Observed</h2>
    <div style="font-size:14px;color:#555;margin-bottom:8px">
      Optional – recognizes team members going above and beyond (+10 max)
    </div>
    <button id="addPositiveBtn">Add Positive Experience</button>
    <div id="positiveList"></div>
  `;

  document
    .getElementById('addPositiveBtn')
    .addEventListener('click', addPositiveExperience);
}
function addPositiveExperience() {
  if (positiveExperiences.length >= 5) {
    alert('Maximum of 5 positive experiences allowed.');
    return;
  }

  const entry = { name: '', notes: '' };
  positiveExperiences.push(entry);

  renderPositiveExperienceEntries();
}
function renderPositiveExperienceEntries() {
  const list = document.getElementById('positiveList');
  list.innerHTML = '';

  positiveExperiences.forEach((entry, index) => {
    const div = document.createElement('div');
    div.style.marginTop = '12px';

    div.innerHTML = `
      <div style="font-weight:bold">Team Member Name</div>
      <input type="text" style="width:100%;margin-bottom:6px"
        value="${entry.name}">
      <div style="font-weight:bold">What was observed?</div>
      <textarea style="width:100%">${entry.notes}</textarea>
    `;

    const inputs = div.querySelectorAll('input, textarea');
    inputs[0].addEventListener('input', e => {
      entry.name = e.target.value;
      updateScore(currentConfig);
    });
    inputs[1].addEventListener('input', e => {
      entry.notes = e.target.value;
      updateScore(currentConfig);
    });

    list.appendChild(div);
  });

  updateScore(currentConfig);
}
function renderInspection(cfg) {
  const container = document.getElementById('inspection');

  cfg.sections.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    const h2 = document.createElement('h2');
    h2.innerText = section.title;
    sectionDiv.appendChild(h2);

    section.questions.forEach(q => {
      const row = document.createElement('div');
      row.style.marginBottom = '12px';

      const label = document.createElement('div');
      label.innerText = q.label;
      label.style.fontWeight = 'bold';

      const yes = document.createElement('input');
      yes.type = 'radio';
      yes.name = q.id;
      yes.value = 'yes';

      const no = document.createElement('input');
      no.type = 'radio';
      no.name = q.id;
      no.value = 'no';

      const notes = document.createElement('textarea');
      notes.placeholder = 'Notes (required if No)';
      notes.style.display = 'none';
      notes.style.width = '100%';

      yes.addEventListener('change', () => {
        notes.style.display = 'none';
        answers[q.id] = 'yes';
        updateScore(cfg);
      });

      no.addEventListener('change', () => {
        notes.style.display = 'block';
        answers[q.id] = 'no';
        updateScore(cfg);
      });
const storeSelect = document.getElementById('storeSelect');

storeSelect.addEventListener('change', () => {
  selectedStore = storeSelect.value;
  updateScore(currentConfig);
});

      row.appendChild(label);
      row.appendChild(yes);
      row.appendChild(document.createTextNode(' Yes '));
      row.appendChild(no);
      row.appendChild(document.createTextNode(' No'));
      row.appendChild(notes);

      sectionDiv.appendChild(row);
    });

    container.appendChild(sectionDiv);
  });
}

function renderSinglePositiveExperienceField() {
  const container = document.getElementById('positive-experiences');

  const nameLabel = document.createElement('div');
  nameLabel.innerText = 'Team Member Name';
  nameLabel.style.fontWeight = 'bold';

  const nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.style.width = '100%';
  nameInput.style.marginBottom = '8px';

  const notesLabel = document.createElement('div');
  notesLabel.innerText = 'What was observed?';
  notesLabel.style.fontWeight = 'bold';

  const notesInput = document.createElement('textarea');
  notesInput.placeholder = 'Describe the positive behavior you observed';
  notesInput.style.width = '100%';

  container.appendChild(nameLabel);
  container.appendChild(nameInput);
  container.appendChild(notesLabel);
  container.appendChild(notesInput);
}

function updateScore(cfg) {
  const warning = document.getElementById('storeWarning');

  if (!selectedStore) {
    document.getElementById('score').innerText = 0;
    if (warning) warning.style.display = 'block';
    return;
  }

  if (warning) warning.style.display = 'none';

  let baseScore = 0;
  Object.values(answers).forEach(v => {
    if (v === 'yes') baseScore += cfg.logic.scorePerYes;
  });

  // ✅ Bonus logic
  let bonus = positiveExperiences.filter(
    p => p.notes.trim() !== ''
  ).length * 2;

  bonus = Math.min(bonus, 10);

  document.getElementById('score').innerText = baseScore + bonus;
  document.getElementById('bonus').innerText = bonus;
}
</script>



</body>
</html>
