<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dispensary Visit Scorecard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;

    }
    h1 {
      margin-bottom: 12px;
    }
    .card {
      background: white;
      padding: 16px;
      border-radius: 6px;
    }
    .section {
  background: white;
  padding: 16px;
  margin-top: 16px;
  border-radius: 6px;
}
textarea {
  margin-top: 6px;
}
  </style>
</head>
<body>

<h1>Dispensary Visit Scorecard</h1>

<div class="card">
  <div><strong>Status:</strong> <span id="status">Loading…</span></div>
  <div>
    <strong>Score:</strong>
    <span id="score">0</span> / 100
     (+<span id="bonus">0</span> bonus)
  </div>
  <div id="storeWarning" style="color:#b00020; font-size:14px; display:none;">
    Please select a store to begin scoring.
  </div>
</div>
<div class="section">
  <h2>Store Being Visited</h2>

 <label for="storeSelect" style="font-weight:bold">
  Select Dispensary
</label>

<!-- inspection + positive experiences are above this -->



<div id="reviewScreen" class="section" style="display:none;"></div>
  <select id="storeSelect" style="width:100%; margin-top:6px">
    <option value="">— Select a location —</option>
  <option value="East Liverpool">East Liverpool</option>
  <option value="Elyria">Elyria</option>
  <option value="Cuyahoga Falls">Cuyahoga Falls</option>
  <option value="Harrison">Harrison</option>
  <option value="Norwood">Norwood</option>
  <option value="New Paris">New Paris</option>
  <option value="Keowee">Keowee</option>
</select>
  <label for="storeManagers" style="font-weight:bold; margin-top:10px; display:block;">
  Store Manager(s)
</label>

<input
  type="text"
  id="storeManagers"
  placeholder="Enter store manager name(s)"
  style="width:100%; margin-top:6px;"
/>
  <label for="personVisiting" style="font-weight:bold; margin-top:10px; display:block;">
  Person Visiting
</label>

<input
  type="text"
  id="personVisiting"
  placeholder="Enter name of person conducting visit"
  style="width:100%; margin-top:6px;"
/>
<label for="visitDate" style="font-weight:bold; margin-top:10px; display:block;">
  Date of Visit
</label>

<input
  type="date"
  id="visitDate"
  style="width:100%; margin-top:6px;"
/>
</div>
<div id="inspection"></div>
  <div id="positive-experiences" class="section"></div>
  <div class="section">
  <button
    id="submitInspection"
    style="font-size:16px; padding:10px 14px; width:100%;">
    Review & Submit Inspection
  </button>
</div>
<script>
  let positiveExperiences = [];
  let selectedStore = '';
  let storeManagers = '';
  let personVisiting = '';
  let visitDate = '';

let answers = {};
  
let ratings = {};


let currentConfig;

fetch('config.json')
  .then(r => r.json())
  .then(cfg => {
    currentConfig = cfg;

    document.getElementById('status').innerText =
      'Loaded: ' + cfg.inspectionMeta.inspectionName;

    renderInspection(cfg);
   renderPositiveExperiences();

    updateScore(cfg);
  })
  .catch(err => {
    document.getElementById('status').innerText =
      'Config load error: ' + err.message;
    console.error(err);
  });

function renderPositiveExperiences() {
  const container = document.getElementById('positive-experiences');

  container.innerHTML = `
    <h2>Positive Experiences Observed</h2>
    <div style="font-size:14px;color:#555;margin-bottom:8px">
      Optional – recognizes team members going above and beyond (+10 max)
    </div>
    <button id="addPositiveBtn">Add Positive Experience</button>
    <div id="positiveList"></div>
  `;

  document
    .getElementById('addPositiveBtn')
    .addEventListener('click', addPositiveExperience);
}
function addPositiveExperience() {
  if (positiveExperiences.length >= 5) {
    alert('Maximum of 5 positive experiences allowed.');
    return;
  }

  const entry = { name: '', notes: '' };
  positiveExperiences.push(entry);

  renderPositiveExperienceEntries();
}
function renderPositiveExperienceEntries() {
  const list = document.getElementById('positiveList');
  list.innerHTML = '';

  positiveExperiences.forEach((entry, index) => {
    const div = document.createElement('div');
    div.style.marginTop = '12px';

    div.innerHTML = `
      <div style="font-weight:bold">Team Member Name</div>
      <input type="text" style="width:100%;margin-bottom:6px"
        value="${entry.name}">
      <div style="font-weight:bold">What was observed?</div>
      <textarea style="width:100%">${entry.notes}</textarea>
    `;

    const inputs = div.querySelectorAll('input, textarea');
    inputs[0].addEventListener('input', e => {
      entry.name = e.target.value;
      updateScore(currentConfig);
    });
    inputs[1].addEventListener('input', e => {
      entry.notes = e.target.value;
      updateScore(currentConfig);
    });

    list.appendChild(div);
  });

  updateScore(currentConfig);
}
function renderInspection(cfg) {
  const container = document.getElementById('inspection');

  cfg.sections.forEach(section => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    const h2 = document.createElement('h2');
    h2.innerText = section.title;
    sectionDiv.appendChild(h2);

    section.questions.forEach(q => {
      const row = document.createElement('div');
      row.style.marginBottom = '12px';

      const label = document.createElement('div');
      label.innerText = q.label;
      label.style.fontWeight = 'bold';

      const yes = document.createElement('input');
      yes.type = 'radio';
      yes.name = q.id;
      yes.value = 'yes';

      const no = document.createElement('input');
      no.type = 'radio';
      no.name = q.id;
      no.value = 'no';

      const notes = document.createElement('textarea');
      notes.placeholder = 'Notes (required if No)';
      notes.style.display = 'none';
      notes.style.width = '100%';
const ratingLabel = document.createElement('div');
ratingLabel.innerText = 'Score (1–5)';
ratingLabel.style.fontWeight = 'bold';
ratingLabel.style.marginTop = '6px';

const ratingSelect = document.createElement('select');
ratingSelect.style.width = '100%';
ratingSelect.style.marginTop = '4px';

ratingSelect.innerHTML = `
  <option value="">Select score</option>
  <option value="1">1 – Unacceptable</option>
  <option value="2">2 – Needs Improvement</option>
  <option value="3">3 – Meets Expectations</option>
  <option value="4">4 – Exceeds Expectations</option>
  <option value="5">5 – Outstanding</option>
`;

ratingSelect.addEventListener('change', e => {
  ratings[q.id] = e.target.value ? Number(e.target.value) : null;
});
``
      yes.addEventListener('change', () => {
        notes.style.display = 'none';
        answers[q.id] = 'yes';
        updateScore(cfg);
      });

      no.addEventListener('change', () => {
        notes.style.display = 'block';
        answers[q.id] = 'no';
        updateScore(cfg);
      });
const storeSelect = document.getElementById('storeSelect');
document
  .getElementById('submitInspection')
  .addEventListener('click', showReviewScreen);
storeSelect.addEventListener('change', () => {
  selectedStore = storeSelect.value;
  updateScore(currentConfig);
});
document.getElementById('storeManagers').addEventListener('input', e => {
  storeManagers = e.target.value;
});
      document.getElementById('personVisiting').addEventListener('input', e => {
  personVisiting = e.target.value;
});
      document.getElementById('visitDate').addEventListener('change', e => {
  visitDate = e.target.value;
});
      row.appendChild(label);
      row.appendChild(yes);
      row.appendChild(document.createTextNode(' Yes '));
      row.appendChild(no);
      row.appendChild(document.createTextNode(' No'));
      row.appendChild(notes);

      sectionDiv.appendChild(row);
    });

    container.appendChild(sectionDiv);
  });
}

function updateScore(cfg) {
  const warning = document.getElementById('storeWarning');

  if (!selectedStore) {
    document.getElementById('score').innerText = 0;
    if (warning) warning.style.display = 'block';
    return;
  }

  if (warning) warning.style.display = 'none';

  let baseScore = 0;
  Object.values(answers).forEach(v => {
    if (v === 'yes') baseScore += cfg.logic.scorePerYes;
  });

  // ✅ Bonus logic
  let bonus = positiveExperiences.filter(
    p => p.notes.trim() !== ''
  ).length * 2;

  bonus = Math.min(bonus, 10);

  document.getElementById('score').innerText = baseScore + bonus;
  document.getElementById('bonus').innerText = bonus;
}
  function submitInspection() {
  // 1️⃣ Validate store
  if (!selectedStore) {
    alert('Please select a store before submitting.');
    return;
  }

  // 2️⃣ Build payload
  const payload = {
    store: selectedStore,
    date: new Date().toISOString(),
    baseScore: calculateBaseScore(),
    bonusScore: calculateBonusScore(),
    totalScore: calculateBaseScore() + calculateBonusScore(),
    answers: answers,
    positiveExperiences: positiveExperiences.filter(
      p => p.name.trim() !== '' || p.notes.trim() !== ''
    )
  };

  // 3️⃣ Lock the inspection
  lockInspection();

  // 4️⃣ Confirm to user (for now)
  console.log('SUBMITTED INSPECTION:', payload);
  alert('Inspection submitted successfully.');
}
  function calculateBaseScore() {
  let score = 0;
  Object.values(answers).forEach(v => {
    if (v === 'yes') score += currentConfig.logic.scorePerYes;
  });
  return score;
}

function calculateBonusScore() {
  let bonus = positiveExperiences.filter(
    p => p.name.trim() !== '' && p.notes.trim() !== ''
  ).length * 2;

  return Math.min(bonus, 10);
}
function lockInspection() {
  // Disable all inputs
  document
    .querySelectorAll('input, textarea, select, button')
    .forEach(el => {
      if (el.id !== 'submitInspection') {
        el.disabled = true;
      }
    });

  // Update status
  document.getElementById('status').innerText = 'Inspection submitted';
}
storeManagers.trim

  const review = document.getElementById('reviewScreen');
  review.style.display = 'block';

  // Hide main content while reviewing
  document.getElementById('inspection').style.display = 'none';
  document.getElementById('positive-experiences').style.display = 'none';

  const baseScore = calculateBaseScore();
  const bonusScore = calculateBonusScore();
  const totalScore = baseScore + bonusScore;

  // Build list of issues (No answers)
  let issuesHtml = '';
  currentConfig.sections.forEach(section => {
    section.questions.forEach(q => {
      if (answers[q.id] === 'no') {
        issuesHtml += `
          <li>
            <strong>${q.label}</strong>
          </li>
        `;
      }
    });
  });

  if (!issuesHtml) {
    issuesHtml = '<li>No issues noted.</li>';
  }
function exitReviewScreen() {
  document.getElementById('reviewScreen').style.display = 'none';
  document.getElementById('inspection').style.display = 'block';
  document.getElementById('positive-experiences').style.display = 'block';
}

  // Build positive experiences list
  let positivesHtml = '';
  positiveExperiences.forEach(p => {
    if (p.name.trim() || p.notes.trim()) {
      positivesHtml += `
        <li>
          <strong>${p.name || 'Team Member'}:</strong>
          ${p.notes}
        </li>
      `;
    }
  });

  if (!positivesHtml) {
    positivesHtml = '<li>No positive experiences recorded.</li>';
  }

  review.innerHTML = `
    <h2>Final Review</h2>

    <div style="margin-bottom:16px">
  <p><strong>Store:</strong> ${selectedStore}</p>
  <p><strong>Store Manager(s):</strong> ${storeManagers || '—'}</p>
  <p><strong>Person Visiting:</strong> ${personVisiting || '—'}</p>
  <p><strong>Date of Visit:</strong> ${visitDate || '—'}</p>
</div>

    <p>
      <strong>Score:</strong>
      ${baseScore} base + ${bonusScore} bonus = 
      <strong>${totalScore}</strong>
    </p>

    <h3>Issues / Opportunities</h3>
    <ul>${issuesHtml}</ul>

    <h3>Positive Experiences</h3>
    <ul>${positivesHtml}</ul>

    <div style="margin-top:16px">
      <button id="confirmSubmit">Confirm & Submit</button>
      <button id="goBackEdit" style="margin-left:8px">Go Back & Edit</button>
    </div>
  `;

  document
    .getElementById('confirmSubmit')
    .addEventListener('click', submitInspection);

  document
    .getElementById('goBackEdit')
    .addEventListener('click', exitReviewScreen);
}
</script>



</body>
</html>
