<script>
  fetch('config.json')
    .then(r => {
      if (!r.ok) {
        throw new Error('HTTP ' + r.status);
      }
      return r.json();
    })
    .then(cfg => {
      document.getElementById('status').innerText =
        'Loaded: ' + cfg.inspectionMeta.inspectionName;
    })
    .catch(err => {
      document.getElementById('status').innerText =
        'Config load error: ' + err.message;
      console.error(err);
    });
</script>
